<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PymeStudio — Gestión ágil para tu PyME</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

:root {
  /* palette — PymeStudio: cream, ink, terracotta, forest accents */
  --bg:        #F4EFE6;
  --bg-2:      #EBE4D5;
  --ink:       #1A1A1A;
  --ink-2:     #3A3A36;
  --muted:     #7A746A;
  --line:      rgba(26,26,26,.10);
  --line-2:    rgba(26,26,26,.18);
  --accent:    #C24A1F;   /* terracotta — primary accent */
  --accent-2:  #E37449;   /* lighter terracotta */
  --sage:      #CCE2BD;   /* logo sage — surface tone */
  --sage-2:    #B8D3A6;   /* deeper sage */
  --forest:    #1E4538;   /* logo dark green — logo + secondary */
  --forest-2:  #2A6450;
  --paper:     #FBF8F1;
  --shadow:    0 1px 0 rgba(26,26,26,.05), 0 24px 60px -30px rgba(26,26,26,.25);

  --radius-sm: 10px;
  --radius:    14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  --font-sans: "Geist", ui-sans-serif, system-ui, sans-serif;
  --font-serif: "Instrument Serif", ui-serif, Georgia, serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --nav-h: 72px;
  --container: 1240px;
}

html[data-theme="dark"] {
  --bg:     #14130F;
  --bg-2:   #1C1A15;
  --ink:    #F4EFE6;
  --ink-2:  #D8D2C5;
  --muted:  #8A8275;
  --line:   rgba(244,239,230,.10);
  --line-2: rgba(244,239,230,.18);
  --accent:   #E37449;
  --accent-2: #F09063;
  --forest:   #C9D6BD;
  --forest-2: #A8B89B;
  --paper:    #1E1C17;
  --shadow:   0 1px 0 rgba(244,239,230,.04), 0 24px 60px -30px rgba(0,0,0,.6);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "ss02";
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img, svg, video { display: block; max-width: 100%; }

.container {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 24px;
}
@media (max-width: 720px) {
  .container { padding: 0 20px; }
}

/* —— Typography utilities —— */
.eyebrow {
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.eyebrow::before {
  content: "";
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
}
.section-title {
  font-size: clamp(36px, 5vw, 64px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  font-weight: 500;
  margin: 16px 0 0;
  text-wrap: balance;
}
.section-title em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.lede {
  font-size: 18px;
  color: var(--ink-2);
  max-width: 56ch;
  line-height: 1.45;
  margin: 20px 0 0;
}

/* —— Buttons —— */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 48px;
  padding: 0 22px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 500;
  border: 1px solid transparent;
  transition: transform .15s ease, background .2s ease, color .2s ease, border-color .2s ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn--primary {
  background: var(--ink);
  color: var(--bg);
}
.btn--primary:hover { background: var(--accent); color: #fff; }
.btn--ghost {
  background: transparent;
  color: var(--ink);
  border-color: var(--line-2);
}
.btn--ghost:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn--accent {
  background: var(--accent);
  color: #fff;
}
.btn--accent:hover { background: var(--ink); color: var(--bg); }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 32px;
  padding: 0 12px;
  border-radius: 999px;
  background: var(--bg-2);
  color: var(--ink-2);
  font-size: 13px;
  border: 1px solid var(--line);
}

/* —— Nav —— */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  height: var(--nav-h);
  display: flex;
  align-items: center;
  transition: background .25s ease, backdrop-filter .25s ease, border-color .25s ease;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: color-mix(in oklab, var(--bg) 80%, transparent);
  backdrop-filter: saturate(140%) blur(14px);
  -webkit-backdrop-filter: saturate(140%) blur(14px);
  border-bottom-color: var(--line);
}
.nav__inner {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}
.nav__logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.nav__logo-mark {
  width: 28px; height: 28px;
  display: inline-grid;
  place-items: center;
  color: var(--accent);
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 18px;
}
.nav__links {
  display: flex;
  gap: 28px;
  font-size: 14.5px;
  color: var(--ink-2);
}
.nav__links a:hover { color: var(--accent); }
.nav__cta {
  display: flex;
  gap: 8px;
  align-items: center;
}
.nav__cta .btn {
  height: 38px;
  padding: 0 16px;
  font-size: 13.5px;
  font-weight: 500;
}
.nav__cta .btn--ghost {
  border-color: transparent;
  background: transparent;
}
.nav__cta .btn--ghost:hover {
  background: var(--bg-2);
  color: var(--ink);
  border-color: transparent;
}
._unused_ {
  gap: 10px;
  align-items: center;
}
.nav__menu-btn {
  display: none;
  background: transparent;
  border: 1px solid var(--line-2);
  border-radius: 999px;
  height: 40px;
  width: 40px;
  align-items: center;
  justify-content: center;
}
@media (max-width: 920px) {
  .nav__links, .nav__cta .btn--ghost { display: none; }
  .nav__menu-btn { display: inline-flex; }
}

/* mobile drawer */
.drawer {
  position: fixed;
  inset: 0;
  z-index: 60;
  background: var(--bg);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  transform: translateY(-100%);
  transition: transform .35s cubic-bezier(.6,.05,.1,1);
  pointer-events: none;
}
.drawer.open {
  transform: translateY(0);
  pointer-events: auto;
}
.drawer__head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: var(--nav-h);
  margin-top: -8px;
}
.drawer__links {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 12px;
}
.drawer__links a {
  font-size: 32px;
  letter-spacing: -.02em;
  padding: 12px 0;
  border-top: 1px solid var(--line);
}
.drawer__links a:last-child { border-bottom: 1px solid var(--line); }
.drawer__cta { display: flex; gap: 10px; margin-top: auto; }
@media (min-width: 921px) {
  .drawer { display: none !important; }
}

/* —— Sections —— */
section { padding: 96px 0; position: relative; }
@media (max-width: 720px) { section { padding: 64px 0; } }

.section-head {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  max-width: 880px;
  margin-bottom: 48px;
}
.section-head--center {
  align-items: center;
  text-align: center;
  margin-left: auto; margin-right: auto;
}
.section-head--center .lede { margin-left: auto; margin-right: auto; }

/* reveal on scroll */
.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity .8s ease, transform .8s cubic-bezier(.2,.7,.2,1);
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}

/* —— Marquee —— */
.marquee {
  overflow: hidden;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  padding: 28px 0;
  background: var(--bg);
}
.marquee__track {
  display: flex;
  gap: 64px;
  align-items: center;
  animation: marquee 38s linear infinite;
  width: max-content;
}
.marquee__item {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--ink-2);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
  opacity: .8;
}
.marquee__item svg { width: 26px; height: 26px; }
@keyframes marquee {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* —— Hero —— */
.hero {
  padding: calc(var(--nav-h) + 60px) 0 60px;
  position: relative;
}
.hero__inner {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 64px;
  align-items: center;
}
@media (max-width: 980px) {
  .hero__inner { grid-template-columns: 1fr; gap: 48px; }
}
.hero__avatars {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.hero__avatar-stack {
  display: flex;
}
.hero__avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--bg);
  margin-left: -10px;
  background-size: cover;
  background-position: center;
}
.hero__avatar:first-child { margin-left: 0; }

.hero__title {
  font-size: clamp(44px, 6vw, 80px);
  line-height: 0.98;
  letter-spacing: -0.03em;
  font-weight: 500;
  margin: 0;
  text-wrap: balance;
}
.hero__title em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
}
.hero__sub {
  font-size: 18px;
  max-width: 50ch;
  margin: 24px 0 32px;
  color: var(--ink-2);
}
.hero__ctas { display: flex; gap: 12px; flex-wrap: wrap; }

/* hero visual */
.hero__visual {
  position: relative;
  aspect-ratio: 4/5;
  border-radius: var(--radius-xl);
  overflow: hidden;
  background: var(--forest);
  box-shadow: var(--shadow);
}
.hero__visual--video {
  background: linear-gradient(160deg, #2B3A2E 0%, #1A1F1B 100%);
}
.hero__visual-tag {
  position: absolute;
  left: 18px; top: 18px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(244,239,230,.16);
  backdrop-filter: blur(10px);
  color: #F4EFE6;
  font-size: 12.5px;
  letter-spacing: .04em;
  text-transform: uppercase;
  z-index: 2;
}
.hero__visual-tag .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #9BB369;
  box-shadow: 0 0 0 4px rgba(155,179,105,.25);
  animation: pulse 2s ease infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(155,179,105,.25); }
  50% { box-shadow: 0 0 0 8px rgba(155,179,105,.05); }
}

/* —— Stats —— */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.stats__item {
  padding: 40px 28px;
  border-right: 1px solid var(--line);
}
.stats__item:last-child { border-right: none; }
.stats__num {
  font-size: clamp(48px, 5.5vw, 76px);
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1;
  margin: 0;
}
.stats__num em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.stats__label {
  margin: 14px 0 0;
  font-size: 14.5px;
  color: var(--ink-2);
  max-width: 28ch;
}
@media (max-width: 900px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .stats__item { border-right: none; border-bottom: 1px solid var(--line); }
  .stats__item:nth-child(odd) { border-right: 1px solid var(--line); }
  .stats__item:nth-last-child(-n+2) { border-bottom: none; }
}

/* —— Modules grid —— */
.modules {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}
.module {
  grid-column: span 4;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 260px;
  transition: transform .25s ease, border-color .25s ease, background .25s ease;
  position: relative;
  overflow: hidden;
}
.module:hover {
  transform: translateY(-4px);
  border-color: var(--line-2);
}
.module--wide { grid-column: span 8; min-height: 320px; }
.module--accent { background: var(--ink); color: var(--bg); }
.module--accent .module__title,
.module--accent .module__desc { color: var(--bg); }
.module--accent .module__icon {
  background: rgba(244,239,230,.12);
  color: var(--bg);
}
.module--forest {
  background: var(--forest);
  color: #F4EFE6;
}
.module--forest .module__title,
.module--forest .module__desc { color: #F4EFE6; }
.module--forest .module__icon { background: rgba(244,239,230,.12); color: #F4EFE6; }

.module__icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--bg-2);
  color: var(--ink);
  display: grid;
  place-items: center;
}
.module__icon svg { width: 22px; height: 22px; }
.module__title {
  font-size: 22px;
  letter-spacing: -0.015em;
  font-weight: 500;
  margin: 6px 0 0;
}
.module__desc {
  margin: 0;
  color: var(--ink-2);
  font-size: 14.5px;
  line-height: 1.5;
}
.module__num {
  position: absolute;
  top: 22px; right: 24px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .05em;
  font-family: var(--font-mono);
}
@media (max-width: 980px) {
  .module, .module--wide { grid-column: span 6; }
}
@media (max-width: 640px) {
  .module, .module--wide { grid-column: span 12; }
}

/* —— Dashboard mock —— */
.dashboard {
  background: var(--forest);
  color: #F4EFE6;
  border-radius: var(--radius-xl);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr 1.15fr;
  gap: 56px;
  align-items: stretch;
  position: relative;
  overflow: hidden;
}
.dashboard::before {
  content: "";
  position: absolute;
  top: -120px; right: -120px;
  width: 360px; height: 360px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(227,116,73,.22) 0%, transparent 65%);
  pointer-events: none;
}
.dashboard__left {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.dashboard__kpis {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
  margin: 32px 0 36px;
  border-top: 1px solid rgba(244,239,230,.14);
  border-bottom: 1px solid rgba(244,239,230,.14);
}
.dashboard__kpi {
  padding: 18px 16px 18px 0;
  border-right: 1px solid rgba(244,239,230,.14);
}
.dashboard__kpi:last-child { border-right: none; padding-left: 16px; }
.dashboard__kpi:nth-child(2) { padding-left: 16px; }
.dashboard__kpi-label {
  font-size: 11px;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: rgba(244,239,230,.55);
}
.dashboard__kpi-value {
  font-size: 28px;
  margin-top: 6px;
  letter-spacing: -.02em;
  font-weight: 500;
  line-height: 1;
}
.dashboard__kpi-value em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  color: #E37449;
}
.dashboard__kpi-trend {
  font-size: 11.5px;
  margin-top: 6px;
  color: #9BB369;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.dashboard__kpi-trend--neg { color: #E37449; }
.dashboard__features {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 32px;
}
.dashboard__feature {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  font-size: 14.5px;
  color: rgba(244,239,230,.85);
  line-height: 1.45;
}
.dashboard__feature svg {
  flex-shrink: 0;
  margin-top: 3px;
  color: #E37449;
}
.dashboard__feature strong {
  color: #F4EFE6;
  font-weight: 500;
}
.dashboard__title {
  font-size: clamp(36px, 4.4vw, 60px);
  line-height: 1.02;
  letter-spacing: -0.025em;
  font-weight: 500;
  margin: 16px 0 0;
}
.dashboard__title em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
}
.dashboard__desc {
  margin: 22px 0 28px;
  color: rgba(244,239,230,.78);
  max-width: 46ch;
  font-size: 17px;
  line-height: 1.5;
}
  max-width: 42ch;
}
.dashboard__tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  border-bottom: 1px solid rgba(244,239,230,.15);
  padding-bottom: 0;
  flex-wrap: wrap;
}
.dashboard__tab {
  background: none;
  border: none;
  color: rgba(244,239,230,.6);
  padding: 10px 0;
  margin-right: 18px;
  font-size: 14px;
  position: relative;
  transition: color .2s;
}
.dashboard__tab.active { color: #F4EFE6; }
.dashboard__tab.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--accent);
}

.ui-mock {
  background: var(--paper);
  color: var(--ink);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 24px 60px -20px rgba(0,0,0,.4);
  font-size: 13px;
}
.ui-mock__head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
}
.ui-mock__head-left { display: flex; align-items: center; gap: 8px; font-weight: 500; }
.ui-mock__body { padding: 18px; }

@media (max-width: 880px) {
  .dashboard { grid-template-columns: 1fr; padding: 32px; gap: 32px; }
  .dashboard__kpis { grid-template-columns: 1fr 1fr; }
  .dashboard__kpi:nth-child(2) { border-right: none; }
  .dashboard__kpi:nth-child(3) { border-top: 1px solid rgba(244,239,230,.14); padding-top: 18px; padding-left: 0; }
}

/* —— Steps —— */
.steps {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
}
.step {
  padding: 32px 24px 36px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.step:last-child { border-right: none; }
.step__num {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .05em;
}
.step__title {
  font-size: 22px;
  letter-spacing: -0.015em;
  font-weight: 500;
  line-height: 1.1;
  margin: 0;
}
.step__title em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
}
.step__desc {
  margin: 0;
  font-size: 14.5px;
  color: var(--ink-2);
  line-height: 1.5;
}
.step__icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--bg-2);
  display: grid; place-items: center;
  margin-bottom: 4px;
}
@media (max-width: 980px) {
  .steps { grid-template-columns: repeat(2, 1fr); }
  .step { border-right: none; border-bottom: 1px solid var(--line); }
  .step:nth-child(odd) { border-right: 1px solid var(--line); }
}
@media (max-width: 560px) {
  .steps { grid-template-columns: 1fr; }
  .step { border-right: none !important; }
}

/* —— Testimonials —— */
.testimonials {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.testimonial {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 280px;
}
.testimonial__quote {
  font-size: 19px;
  line-height: 1.4;
  letter-spacing: -0.01em;
  margin: 0;
  flex: 1;
}
.testimonial__quote em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
}
.testimonial__author {
  display: flex;
  align-items: center;
  gap: 12px;
}
.testimonial__avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg-2);
  background-size: cover;
  background-position: center;
}
.testimonial__name { font-weight: 500; font-size: 14.5px; }
.testimonial__role { font-size: 13px; color: var(--muted); }
.testimonial__stars { display: flex; gap: 2px; color: var(--accent); }
@media (max-width: 900px) { .testimonials { grid-template-columns: 1fr; } }

/* —— Pricing —— */
.pricing-toggle {
  display: inline-flex;
  padding: 4px;
  background: var(--bg-2);
  border-radius: 999px;
  border: 1px solid var(--line);
  margin: 0 auto 40px;
  position: relative;
}
.pricing-toggle__btn {
  background: none;
  border: none;
  padding: 9px 20px;
  border-radius: 999px;
  font-size: 14px;
  color: var(--ink-2);
  transition: color .2s;
  z-index: 2;
  position: relative;
}
.pricing-toggle__btn.active { color: var(--bg); }
.pricing-toggle__slider {
  position: absolute;
  top: 4px;
  height: calc(100% - 8px);
  background: var(--ink);
  border-radius: 999px;
  transition: left .3s cubic-bezier(.4,0,.2,1), width .3s cubic-bezier(.4,0,.2,1);
  z-index: 1;
}
.pricing-toggle__badge {
  margin-left: 8px;
  font-size: 11px;
  background: var(--accent);
  color: #fff;
  padding: 2px 8px;
  border-radius: 999px;
}

.pricing {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.plan {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  position: relative;
}
.plan--featured {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.plan--featured .plan__name,
.plan--featured .plan__price,
.plan--featured .plan__desc,
.plan--featured .plan__feature { color: var(--bg); }
.plan--featured .plan__feature svg { color: var(--accent-2); }
.plan__badge {
  position: absolute;
  top: -10px; left: 32px;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.plan__name {
  font-size: 14px;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin: 0;
  font-weight: 500;
}
.plan__price {
  font-size: 48px;
  letter-spacing: -0.03em;
  font-weight: 500;
  line-height: 1;
  margin: 0;
}
.plan__price-period { font-size: 14px; color: var(--muted); font-weight: 400; }
.plan__price-old {
  font-size: 14px;
  color: var(--muted);
  text-decoration: line-through;
  margin-left: 6px;
  font-weight: 400;
}
.plan__desc {
  font-size: 14.5px;
  color: var(--ink-2);
  margin: 0;
  line-height: 1.45;
}
.plan__features {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.plan__feature {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 14.5px;
  color: var(--ink-2);
}
.plan__feature svg {
  flex-shrink: 0;
  margin-top: 2px;
  color: var(--accent);
}
@media (max-width: 900px) { .pricing { grid-template-columns: 1fr; } }

/* —— Blog —— */
.blog-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.post {
  display: flex;
  flex-direction: column;
  gap: 16px;
  text-decoration: none;
  color: inherit;
}
.post__img {
  aspect-ratio: 5/4;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-2);
}
.post__meta { font-size: 13px; color: var(--muted); }
.post__title {
  font-size: 20px;
  letter-spacing: -0.015em;
  line-height: 1.2;
  font-weight: 500;
  margin: 0;
  transition: color .2s;
}
.post:hover .post__title { color: var(--accent); }
@media (max-width: 900px) { .blog-grid { grid-template-columns: 1fr; } }

/* —— FAQ —— */
.faq {
  max-width: 880px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}
.faq__item {
  border-top: 1px solid var(--line);
  padding: 0;
}
.faq__item:last-child { border-bottom: 1px solid var(--line); }
.faq__btn {
  width: 100%;
  background: none;
  border: none;
  padding: 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-align: left;
  font-size: 19px;
  letter-spacing: -0.01em;
  font-weight: 500;
  color: var(--ink);
}
.faq__btn em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
}
.faq__toggle {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: transform .3s ease, background .2s;
}
.faq__item.open .faq__toggle {
  transform: rotate(45deg);
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.faq__panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s cubic-bezier(.4,0,.2,1);
}
.faq__answer {
  padding: 0 60px 24px 0;
  color: var(--ink-2);
  font-size: 15.5px;
  line-height: 1.55;
}

/* —— Closing CTA —— */
.closing {
  background: var(--forest);
  color: #F4EFE6;
  border-radius: var(--radius-xl);
  padding: 80px 60px;
  display: grid;
  grid-template-columns: 1.1fr .9fr;
  gap: 48px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.closing__title {
  font-size: clamp(40px, 5vw, 72px);
  line-height: 0.98;
  letter-spacing: -0.025em;
  font-weight: 500;
  margin: 16px 0 0;
}
.closing__title em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
}
.closing__desc {
  margin: 24px 0 32px;
  color: rgba(244,239,230,.78);
  max-width: 44ch;
  font-size: 17px;
}
.closing__img {
  aspect-ratio: 4/5;
  border-radius: var(--radius-lg);
  background: rgba(244,239,230,.08);
  overflow: hidden;
}
.closing .eyebrow { color: rgba(244,239,230,.7); }
.closing .eyebrow::before { background: var(--accent-2); }
.closing .btn--primary { background: var(--bg); color: var(--ink); }
.closing .btn--primary:hover { background: var(--accent); color: #fff; }
.closing .btn--ghost { color: var(--bg); border-color: rgba(244,239,230,.3); }
.closing .btn--ghost:hover { background: var(--bg); color: var(--ink); }
@media (max-width: 880px) {
  .closing { grid-template-columns: 1fr; padding: 48px 28px; }
}

/* —— Footer —— */
.footer {
  padding: 80px 0 40px;
  border-top: 1px solid var(--line);
  margin-top: 80px;
}
.footer__grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
  margin-bottom: 60px;
}
.footer__col h4 {
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 18px;
  font-weight: 500;
}
.footer__col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer__col a { color: var(--ink-2); font-size: 14.5px; }
.footer__col a:hover { color: var(--accent); }
.footer__about p {
  color: var(--ink-2);
  font-size: 14.5px;
  max-width: 36ch;
  margin: 16px 0 0;
}
.footer__bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 13.5px;
  gap: 24px;
  flex-wrap: wrap;
}
.footer__big {
  font-size: clamp(80px, 16vw, 220px);
  letter-spacing: -0.05em;
  font-weight: 500;
  line-height: .9;
  margin: 0 0 24px;
  color: var(--ink);
  text-align: center;
}
.footer__big em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
@media (max-width: 880px) {
  .footer__grid { grid-template-columns: 1fr 1fr; }
  .footer__about { grid-column: 1 / -1; }
}

/* mock UI bits */
.bar-row { display: flex; gap: 6px; align-items: center; }
.bar { height: 6px; border-radius: 4px; background: var(--bg-2); }

/* footer social icons */
.footer__social {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 1px solid var(--line);
  background: var(--paper);
  color: var(--ink);
  display: inline-grid;
  place-items: center;
  transition: background .2s, color .2s, border-color .2s, transform .2s;
}
.footer__social:hover {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
  transform: translateY(-2px);
}


/* —— Product-page extensions —————————————————————— */

/* Nav dropdown (Productos) */
.nav__item { position: relative; }
.nav__dropdown {
  position: absolute;
  top: 100%;
  left: -16px;
  margin-top: 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 10px;
  min-width: 360px;
  box-shadow: 0 24px 60px -20px rgba(26,26,26,.18);
  opacity: 0;
  transform: translateY(-6px);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
  z-index: 60;
}
/* Invisible bridge so hover survives crossing the 14px gap */
.nav__dropdown::before {
  content: "";
  position: absolute;
  left: 0; right: 0;
  top: -16px;
  height: 16px;
}
.nav__item:hover .nav__dropdown,
.nav__item:focus-within .nav__dropdown {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.nav__dropdown-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 14px;
  border-radius: 12px;
  transition: background .15s ease;
}
.nav__dropdown-item:hover { background: var(--bg-2); }
.nav__dropdown-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg-2);
  color: var(--ink);
  display: grid; place-items: center;
  flex-shrink: 0;
}
.nav__dropdown-title { font-size: 14.5px; font-weight: 500; }
.nav__dropdown-desc { font-size: 12.5px; color: var(--muted); margin-top: 2px; line-height: 1.35; }

/* Product hero — extends .hero */
.prod-eyebrow-row {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}
.prod-eyebrow-row .eyebrow::before { display: none; }
.prod-eyebrow-row .eyebrow { padding: 0; }
.prod-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  font-size: 11.5px;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--ink-2);
}
.prod-badge--live { color: #3F5142; background: #E8F0DA; border-color: rgba(63,81,66,.2); }
.prod-badge--beta { color: #1f4670; background: #DAE6F0; border-color: rgba(31,70,112,.2); }
.prod-badge--soon { color: #7A2A0E; background: #FCE9DA; border-color: rgba(122,42,14,.2); }

.prod-hero-meta {
  display: flex;
  gap: 28px;
  margin-top: 32px;
  flex-wrap: wrap;
}
.prod-hero-meta-item { font-size: 13px; color: var(--muted); }
.prod-hero-meta-item strong { display: block; font-size: 17px; color: var(--ink); font-weight: 500; margin-top: 2px; letter-spacing: -.01em; }

/* Feature grid (2 column on prod pages) */
.feat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}
.feat {
  padding: 32px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: background .2s ease;
}
.feat:hover { background: var(--paper); }
.feat__icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--bg-2);
  color: var(--ink);
  display: grid; place-items: center;
}
.feat__title {
  font-size: 19px;
  letter-spacing: -.01em;
  font-weight: 500;
  margin: 8px 0 0;
}
.feat__title em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.feat__desc { margin: 0; font-size: 14.5px; color: var(--ink-2); line-height: 1.5; }
@media (max-width: 720px) {
  .feat-grid { grid-template-columns: 1fr; }
}

/* Feature lists with checkmarks (compact) */
.feat-list {
  list-style: none;
  padding: 0; margin: 0;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px 32px;
}
.feat-list li {
  display: flex; gap: 10px;
  align-items: flex-start;
  font-size: 15px;
  color: var(--ink-2);
}
.feat-list li svg { color: var(--accent); flex-shrink: 0; margin-top: 3px; }
@media (max-width: 720px) { .feat-list { grid-template-columns: 1fr; } }

/* "Other products" cross-sell row */
.cross {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.cross__card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: transform .2s, border-color .2s;
}
.cross__card:hover { transform: translateY(-3px); border-color: var(--line-2); }
.cross__card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--bg-2);
  display: grid; place-items: center;
}
.cross__card-name { font-size: 18px; font-weight: 500; letter-spacing: -.01em; margin: 4px 0 0; }
.cross__card-name em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.cross__card-desc { font-size: 13.5px; color: var(--ink-2); margin: 0; line-height: 1.45; }
.cross__card-link {
  margin-top: auto; padding-top: 10px;
  font-size: 13.5px; color: var(--accent);
  display: inline-flex; gap: 6px; align-items: center;
}
@media (max-width: 880px) { .cross { grid-template-columns: 1fr; } }

/* Plan callout for product page */
.plan-callout {
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--radius-xl);
  padding: 40px;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 40px;
  align-items: center;
}
.plan-callout__title {
  font-size: clamp(28px, 3vw, 40px);
  line-height: 1.05;
  letter-spacing: -.02em;
  margin: 16px 0 0;
  font-weight: 500;
}
.plan-callout__title em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.plan-callout__price {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  padding: 28px;
  border: 1px solid rgba(244,239,230,.2);
  border-radius: var(--radius-lg);
  background: rgba(244,239,230,.04);
}
.plan-callout__price-num {
  font-size: 56px;
  letter-spacing: -.03em;
  font-weight: 500;
  line-height: 1;
}
.plan-callout__price-period { font-size: 13px; color: rgba(244,239,230,.6); }
.plan-callout .eyebrow { color: rgba(244,239,230,.6); }
.plan-callout .eyebrow::before { background: var(--accent-2); }
@media (max-width: 880px) { .plan-callout { grid-template-columns: 1fr; padding: 28px; } }

/* Integrations strip */
.int-strip {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.int-pill {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  padding: 10px 16px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 14px;
  color: var(--ink);
}
.int-pill__mark {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
}

/* Module card link arrow */
.module__arrow {
  position: absolute;
  bottom: 24px; right: 24px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg);
  color: var(--ink);
  display: grid; place-items: center;
  opacity: 0; transform: translate(-6px, 6px);
  transition: opacity .25s, transform .25s;
}
.module:hover .module__arrow { opacity: 1; transform: translate(0,0); }
.module--accent .module__arrow,
.module--forest .module__arrow { background: var(--bg); color: var(--ink); }

.module-link {
  text-decoration: none;
  color: inherit;
  display: block;
}
.module__chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: auto;
}
.module__chip {
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-2);
  font-size: 12px;
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.module--accent .module__chip {
  background: rgba(244,239,230,.10);
  border-color: rgba(244,239,230,.18);
  color: var(--bg);
}
.module--forest .module__chip {
  background: rgba(244,239,230,.10);
  border-color: rgba(244,239,230,.18);
  color: #F4EFE6;
}


/* —— Services (external services banner) —— */
.services {
  padding: 120px 0 96px;
  background:
    linear-gradient(180deg, var(--bg) 0%, color-mix(in oklab, var(--sage) 55%, var(--bg)) 24%, color-mix(in oklab, var(--sage) 55%, var(--bg)) 76%, var(--bg) 100%);
  position: relative;
}
.services__head {
  max-width: 720px;
  margin: 0 0 56px;
}
.services__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 920px) {
  .services__grid { grid-template-columns: 1fr; }
}
.service-card {
  display: flex;
  flex-direction: column;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
  color: var(--ink);
}
.service-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 30px 70px -30px rgba(30, 69, 56, .35);
  border-color: var(--accent);
}
.service-card__visual {
  width: 100%;
  aspect-ratio: 400 / 220;
  overflow: hidden;
  position: relative;
  border-bottom: 1px solid var(--line);
}
.service-card__visual svg {
  width: 100%;
  height: 100%;
  display: block;
}
.service-card__body {
  padding: 32px 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
}
.service-card__brand {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--accent);
  line-height: 1;
}
.service-card__brand em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.005em;
  color: var(--ink);
}
.service-card__tagline {
  margin: 0;
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.service-card__desc {
  margin: 0;
  font-size: 15px;
  color: var(--ink-2);
  line-height: 1.5;
  max-width: 50ch;
}
.service-card__bullets {
  list-style: none;
  padding: 0;
  margin: 6px 0 8px;
  display: grid;
  gap: 8px;
}
.service-card__bullets li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: var(--ink-2);
}
.service-card__bullets li svg {
  color: var(--accent);
  flex: 0 0 auto;
}
.service-card__foot {

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <script src="image-slot.js"><\/script>
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
